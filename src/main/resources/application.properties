# =============================================
# DATASOURCE - PostgreSQL (Render)
# A variavel JDBC_DATABASE_URL e injetada automaticamente pelo Render
# quando voce usa um banco PostgreSQL vinculado ao servico
# =============================================
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (desabilitado em producao)
spring.h2.console.enabled=false

# =============================================
# PORTA - O Render injeta a porta via $PORT
# =============================================
server.port=${PORT:8090}

# =============================================
# GOOGLE OAUTH2
# =============================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# =============================================
# EMAIL
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.protocol=smtp
spring.mail.defaultEncoding=UTF-8
support.mail.address=${MAIL_USERNAME}

# =============================================
# ADMIN
# =============================================
admin.email=${ADMIN_EMAIL}

# =============================================
# CORS
# =============================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
